services:
  frontend:
    build:
      context: ./packages/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./packages/frontend/src:/app/src
    depends_on:
      - backend

  backend:
    build: ./packages/backend
    ports:
      - "8000:8000"
    volumes:
      - ./packages/backend/src:/app/src
      - ./plugins:/plugins
    env_file:
      - .env
    environment:
      - DB_USER=iotta
      - DB_PASSWORD=iotta
      - DB_NAME=iotta
    depends_on:
      db:
        condition: service_healthy
  db:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: iotta
      POSTGRES_PASSWORD: iotta
      POSTGRES_DB: iotta
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iotta"]
      interval: 5s
      timeout: 3s
      retries: 10
volumes:
  postgres_data: